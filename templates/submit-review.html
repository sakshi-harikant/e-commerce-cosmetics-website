<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Share Your Experience | UNLEASH Cosmetics</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
  </head>
  <script src="../static/submit-review.js"></script>
  <link rel="stylesheet" type="text/css" href="../static/submit-review.css" />
  <body>
    <!-- Include your navbar here -->

    <div class="review-submission-container">
      <a href="reviews.html" class="back-button">
        <i class="fas fa-arrow-left"></i> Back to Reviews
      </a>

      <div class="submission-header">
        <h1>Share Your Experience</h1>
        <p>We value your honest feedback about our products</p>
      </div>

      <form id="reviewForm" class="review-form">
        <div class="form-group">
          <label for="userName">Your Name</label>
          <input type="text" id="userName" required />
        </div>

        <div class="form-group">
          <label for="userEmail">Email (will not be published)</label>
          <input type="email" id="userEmail" required />
        </div>

        <div class="form-group">
          <label>Rating</label>
          <div class="rating-input">
            <input type="radio" id="star5" name="rating" value="5" />
            <label for="star5">★</label>
            <input type="radio" id="star4" name="rating" value="4" />
            <label for="star4">★</label>
            <input type="radio" id="star3" name="rating" value="3" />
            <label for="star3">★</label>
            <input type="radio" id="star2" name="rating" value="2" />
            <label for="star2">★</label>
            <input type="radio" id="star1" name="rating" value="1" required />
            <label for="star1">★</label>
          </div>
        </div>

        <div class="form-group">
          <label for="reviewTitle">Review Title</label>
          <input type="text" id="reviewTitle" required />
        </div>

        <div class="form-group">
          <label for="productSelect">Product Reviewed</label>
          <select id="productSelect" required>
            <option value="">Select a product</option>
            <option value="Brightening Vitamin C Serum">
              Brightening Vitamin C Serum
            </option>
            <option value="Soothing Aloe Moisturizer">
              Soothing Aloe Moisturizer
            </option>
            <option value="Revitalizing Eye Cream">
              Revitalizing Eye Cream
            </option>
            <option value="Hydrating Facial Mist">Hydrating Facial Mist</option>
            <option value="Detox Clay Mask">Detox Clay Mask</option>
          </select>
        </div>

        <div class="form-group">
          <label for="reviewText">Your Review</label>
          <textarea id="reviewText" required></textarea>
        </div>

        <button type="submit" class="submit-review">Submit Review</button>
      </form>

      <div id="confirmationMessage" class="confirmation-message">
        <i class="fas fa-check-circle"></i>
        <h2>Thank You!</h2>
        <p>Your review has been submitted successfully.</p>
        <p>We appreciate your feedback!</p>
        <a
          href="reviews.html"
          class="submit-review"
          style="text-decoration: none"
        >
          View All Reviews
        </a>
      </div>
    </div>
  </body>
</html>
