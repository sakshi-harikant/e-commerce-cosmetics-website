<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNLEASH. | Order Confirmation</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      /* Reuse your existing CSS variables and base styles */
      :root {
        --primary: #8a4fff;
        --primary-light: #b18aff;
        --primary-pastel: #f0e6ff;
        --secondary: #ff9eb7;
        --dark: #1a1a1a;
        --light: #ffffff;
        --gray: #888888;
        --light-bg: #faf8ff;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Poppins", sans-serif;
        background-color: var(--light-bg);
        color: var(--dark);
        line-height: 1.7;
      }

      /* Reuse your top-bar and navbar styles */
      .top-bar {
        background: linear-gradient(to right, #ffd6e7, #c2f0ff, #e2d1ff);
        text-align: center;
        padding: 10px;
        font-size: 14px;
        font-weight: 500;
      }

      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 5%;
        background: var(--light);
        position: sticky;
        top: 0;
        z-index: 1000;
        box-shadow: 0 2px 30px rgba(0, 0, 0, 0.05);
      }

      .logo {
        font-family: "Playfair Display", serif;
        font-size: 32px;
        font-weight: 700;
        position: relative;
      }

      .logo::after {
        content: "";
        position: absolute;
        bottom: -5px;
        left: 0;
        width: 100%;
        height: 2px;
        background: linear-gradient(to right, var(--primary), var(--secondary));
      }

      .nav-links {
        display: flex;
        gap: 35px;
      }

      .nav-links a {
        position: relative;
        text-decoration: none;
        color: var(--dark);
        font-weight: 500;
        transition: all 0.3s ease;
      }

      .nav-links a:hover {
        color: var(--primary);
      }

      .nav-links a::after {
        content: "";
        position: absolute;
        bottom: -5px;
        left: 0;
        width: 0;
        height: 2px;
        background-color: var(--primary);
        transition: width 0.3s ease;
      }

      .nav-links a:hover::after {
        width: 100%;
      }

      /* Confirmation Container */
      .confirmation-container {
        max-width: 800px;
        margin: 60px auto;
        padding: 0 5%;
        text-align: center;
      }

      .confirmation-card {
        background: var(--light);
        border-radius: 16px;
        padding: 40px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      }

      .confirmation-icon {
        color: var(--primary);
        font-size: 60px;
        margin-bottom: 20px;
      }

      .confirmation-title {
        font-family: "Playfair Display", serif;
        font-size: 32px;
        margin-bottom: 20px;
      }

      .confirmation-message {
        margin-bottom: 30px;
        color: var(--gray);
      }

      .order-details {
        background: var(--primary-pastel);
        border-radius: 12px;
        padding: 20px;
        margin: 30px 0;
        text-align: left;
      }

      .order-detail-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .order-detail-label {
        font-weight: 500;
      }

      .order-detail-value {
        color: var(--primary);
      }

      .continue-shopping-btn {
        background: var(--primary);
        color: white;
        border: none;
        padding: 15px 30px;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 20px;
      }

      .continue-shopping-btn:hover {
        background: var(--dark);
        transform: translateY(-2px);
      }

      .cart-icon {
        position: relative;
        cursor: pointer;
      }

      .cart-icon i {
        font-size: 22px;
        color: var(--dark);
        transition: color 0.3s ease;
      }

      .cart-icon:hover i {
        color: var(--primary);
      }
    </style>
  </head>
  <body>
    <div class="top-bar">FREE SHIPPING ON ALL ORDERS ABOVE ₹499</div>

    <div class="navbar">
      <div class="logo">UNLEASH.</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Shop</a>
        <a href="blogPage.html">Blog</a>
        <a href="reviews.html">Reviews</a>
        <a href="#">Contact</a>
      </div>
      <div class="cart-icon">
        <a href="cart.html">
          <i class="fas fa-shopping-cart"></i>
          <span id="cart-count" class="cart-count">0</span>
        </a>
      </div>
    </div>

    <div class="confirmation-container">
      <div class="confirmation-card">
        <div class="confirmation-icon">
          <i class="fas fa-check-circle"></i>
        </div>
        <h1 class="confirmation-title">Order Confirmed!</h1>
        <p class="confirmation-message">
          Thank you for your purchase. Your order has been received and is being
          processed.
        </p>

        <div class="order-details" id="order-details">
          <!-- Order details will be dynamically inserted here -->
        </div>

        <button
          class="continue-shopping-btn"
          onclick="window.location.href='products.html'"
        >
          Continue Shopping
        </button>
      </div>
    </div>

    <script>
      
      document.addEventListener("DOMContentLoaded", function () {
        // Get order ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get("orderId");

        // Load order details
        const orders = JSON.parse(localStorage.getItem("orders")) || [];
        const order = orders.find((order) => order.id === orderId);

        // Update cart count (should be 0 after checkout)
        document.getElementById("cart-count").textContent = "0";
        document.getElementById("cart-count").style.display = "none";

        if (order) {
          // Display order details
          const orderDetailsContainer =
            document.getElementById("order-details");
          orderDetailsContainer.innerHTML = `
            <div class="order-detail-row">
              <span class="order-detail-label">Order Number:</span>
              <span class="order-detail-value">${order.id}</span>
            </div>
            <div class="order-detail-row">
              <span class="order-detail-label">Date:</span>
              <span class="order-detail-value">${new Date(
                order.date
              ).toLocaleDateString()}</span>
            </div>
            <div class="order-detail-row">
              <span class="order-detail-label">Total:</span>
              <span class="order-detail-value">₹${order.total.toFixed(2)}</span>
            </div>
            <div class="order-detail-row">
              <span class="order-detail-label">Payment Method:</span>
              <span class="order-detail-value">${order.paymentMethod}</span>
            </div>
            <div class="order-detail-row">
              <span class="order-detail-label">Status:</span>
              <span class="order-detail-value">${order.status}</span>
            </div>
          `;
        } else {
          // Order not found
          document.getElementById("order-details").innerHTML =
            "<p>Order details not found.</p>";
        }
      });
    </script>
  </body>
</html>
