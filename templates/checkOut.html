<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNLEASH. | Checkout</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
  <script src="/updatedCodes/static/checkOut.js"></script>
    <link rel="stylesheet" type="text/css" href="../static/checkOut.css" />
  </head>
  <body>
    <div class="top-bar">FREE SHIPPING ON ALL ORDERS ABOVE ₹499</div>

    <div class="navbar">
      <div class="logo">UNLEASH.</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Shop</a>
        <a href="blogPage.html">Blog</a>
        <a href="reviews.html">Reviews</a>
        <a href="#">Contact</a>
      </div>
      <div class="back-arrow">
        <a href="cart.html">
          <i class="fas fa-arrow-left"></i>
        </a>
      </div>
    </div>

    <div class="checkout-container">
      <!-- Checkout Form -->
      <div class="checkout-form">
        <h1 class="checkout-title">Shipping Information</h1>

        <form id="checkout-form">
          <div class="form-row">
            <div class="form-group">
              <label for="first-name">First Name</label>
              <input type="text" id="first-name" required />
            </div>
            <div class="form-group">
              <label for="last-name">Last Name</label>
              <input type="text" id="last-name" required />
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required />
          </div>

          <div class="form-group">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" required />
          </div>

          <div class="form-group">
            <label for="address">Address</label>
            <input type="text" id="address" required />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="city">City</label>
              <input type="text" id="city" required />
            </div>
            <div class="form-group">
              <label for="state">State</label>
              <input type="text" id="state" required />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="zip">ZIP Code</label>
              <input type="text" id="zip" required />
            </div>
            <div class="form-group">
              <label for="country">Country</label>
              <select id="country" required>
                <option value="India">India</option>
                <option value="USA">United States</option>
                <option value="UK">United Kingdom</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="notes">Order Notes (Optional)</label>
            <textarea id="notes" rows="3"></textarea>
          </div>
        </form>
      </div>

      <!-- Order Summary -->
      <div class="order-summary">
        <h2 class="order-summary-title">Your Order</h2>

        <div class="order-items" id="order-items-container">
          <!-- Order items will be dynamically inserted here -->
        </div>

        <div class="order-totals" id="order-totals-container">
          <!-- Order totals will be dynamically inserted here -->
        </div>

        <button class="pay-btn" id="place-order-btn" disabled>
          Place Order
        </button>
      </div>
    </div>
      
  </body>
</html>
